configuration:
  node_ip:
    name: Node IP address
    description: IP address of the Meshtastic node that MeshMonitor should connect to. Leave empty for MeshCore-only installs.
  node_tcp_port:
    name: Node TCP port
    description: TCP port exposed by the Meshtastic node. Default is 4403. Leave empty for MeshCore-only installs.
  timezone:
    name: Timezone
    description: Timezone passed to the MeshMonitor container, for example Europe/Stockholm.
  trust_proxy:
    name: Trust reverse proxy
    description: Enable when HTTPS is terminated by a reverse proxy so secure cookies work correctly.
  cookie_secure:
    name: Secure session cookies
    description: Keep enabled for HTTPS. Disable only for direct HTTP development/testing.
  allowed_origins:
    name: Allowed origins
    description: CORS allowed origins, for example https://meshmonitor.example.com (use * only if needed).
  virtual_node_enabled:
    name: Enable Virtual Node Server
    description: Enable MeshMonitor's Virtual Node Server on port 4404 for Meshtastic mobile app TCP access.
  meshcore_enabled:
    name: Enable MeshCore
    description: Enable MeshMonitor's upstream MeshCore auto-connect support.
  meshcore_connection_type:
    name: MeshCore connection type
    description: Choose whether MeshCore should connect over TCP or a serial device.
  meshcore_tcp_host:
    name: MeshCore TCP host
    description: Hostname or IP address for a MeshCore node when using TCP.
  meshcore_tcp_port:
    name: MeshCore TCP port
    description: TCP port exposed by the MeshCore node. Default is 4403.
  meshcore_serial_port:
    name: MeshCore serial port
    description: Serial device path for MeshCore when using serial mode, for example /dev/ttyUSB0.
  meshcore_baud_rate:
    name: MeshCore baud rate
    description: Serial baud rate used for MeshCore serial mode. Default is 115200.
  meshcore_firmware_type:
    name: MeshCore firmware type
    description: Use companion for standard MeshCore devices or repeater for repeater firmware.

network:
  3001/TCP: MeshMonitor web interface port
  4404/TCP: Virtual Node Server port for Meshtastic mobile apps
